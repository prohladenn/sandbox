name: PR Preview

on:
  pull_request_target:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write
  pages: write

concurrency:
  group: pr-preview-${{ github.event.number }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with PR base path
        run: npm run build
        env:
          VITE_BASE_PATH: /sandbox/pr-preview/pr-${{ github.event.number }}/

      - name: Deploy preview to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          target-folder: pr-preview/pr-${{ github.event.number }}
          clean: true

      - name: Configure GitHub Pages source
        uses: actions/github-script@v7
        with:
          script: |
            const params = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              build_type: 'legacy',
              source: { branch: 'gh-pages', path: '/' }
            };
            try {
              await github.rest.repos.updateInformationAboutPagesSite(params);
              console.log('GitHub Pages configured to deploy from gh-pages branch');
            } catch (e) {
              if (e.status === 409) {
                await github.rest.repos.createPagesSite(params);
                console.log('GitHub Pages enabled and configured to deploy from gh-pages branch');
              } else {
                throw e;
              }
            }

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.issue.number;
            const previewUrl = `https://${owner}.github.io/${repo}/pr-preview/pr-${prNumber}/`;
            const marker = '<!-- pr-preview-comment -->';
            const body = `${marker}\n### 🚀 PR Preview\n\nA preview of this pull request is available at:\n**${previewUrl}**\n\n> Updated on ${new Date().toUTCString()}`;

            const comments = await github.rest.issues.listComments({ owner, repo, issue_number: prNumber });
            const existing = comments.data.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body });
            }

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove preview directory
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -d "pr-preview/pr-${{ github.event.number }}" ]; then
            git rm -rf "pr-preview/pr-${{ github.event.number }}"
            git commit -m "chore: remove PR preview for #${{ github.event.number }}"
            git push
          else
            echo "Preview directory not found, nothing to clean up."
          fi
