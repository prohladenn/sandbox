name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: pages-main
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean-exclude: pr-preview

      - name: Configure GitHub Pages source
        uses: actions/github-script@v7
        with:
          script: |
            const params = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              build_type: 'legacy',
              source: { branch: 'gh-pages', path: '/' }
            };
            try {
              await github.rest.repos.updateInformationAboutPagesSite(params);
              console.log('GitHub Pages configured to deploy from gh-pages branch');
            } catch (e) {
              if (e.status === 409) {
                await github.rest.repos.createPagesSite(params);
                console.log('GitHub Pages enabled and configured to deploy from gh-pages branch');
              } else {
                throw e;
              }
            }
